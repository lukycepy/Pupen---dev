name: Database Checks
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: DB Drift Check
      run: npm run db:drift-check
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        PGSSLMODE: require
    - name: DB RLS Check
      run: npm run db:rls-check
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        PGSSLMODE: require
