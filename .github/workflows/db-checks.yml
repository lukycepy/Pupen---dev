name: Database Checks
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: DB Drift Check
      run: npm run db:drift-check
      env:
        PUPEN_DB_HOST: ${{ secrets.PUPEN_DB_HOST }}
        PUPEN_DB_USER: ${{ secrets.PUPEN_DB_USER }}
        PUPEN_DB_PASS: ${{ secrets.PUPEN_DB_PASS }}
        PUPEN_DB_NAME: ${{ secrets.PUPEN_DB_NAME }}
    - name: DB RLS Check
      run: npm run db:rls-check
      env:
        PUPEN_DB_HOST: ${{ secrets.PUPEN_DB_HOST }}
        PUPEN_DB_USER: ${{ secrets.PUPEN_DB_USER }}
        PUPEN_DB_PASS: ${{ secrets.PUPEN_DB_PASS }}
        PUPEN_DB_NAME: ${{ secrets.PUPEN_DB_NAME }}
